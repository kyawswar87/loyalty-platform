services:
  postgres:
    image: postgres:17-alpine
    container_name: loyalty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty
      POSTGRES_DB: loyalty
    ports:
      # Host 5434 (5432/5433 are already used by other local Postgres instances).
      - "5434:5432"
    volumes:
      - loyalty-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d loyalty"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  loyalty-pgdata:
